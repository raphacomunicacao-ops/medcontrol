<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>MedControl</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#21504F">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MedControl">
<meta name="mobile-web-app-capable" content="yes">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #E9F0EB;
    --bg-elev: #FFFFFF;
    --ink: #1B2A28;
    --ink-soft: #59685F;
    --ink-faint: #8A978F;
    --line: #D3DED6;
    --primary: #21504F;
    --primary-dark: #153635;
    --primary-soft: #DCE8E4;
    --taken: #4C7A63;
    --taken-bg: #E1EEE6;
    --amber: #B9762A;
    --amber-bg: #FAEDDC;
    --red: #B14A34;
    --red-bg: #F6E4DE;
    --radius-lg: 22px;
    --radius-md: 14px;
    --radius-sm: 9px;
    --shadow: 0 4px 16px rgba(21,54,53,0.10);
    --font-display: 'Space Grotesk', sans-serif;
    --font-body: 'IBM Plex Sans', sans-serif;
    --font-mono: 'IBM Plex Mono', monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background: linear-gradient(180deg, #E4EEE7 0%, #ECF2ED 340px, #ECF2ED 100%);
    color: var(--ink);
    font-family: var(--font-body);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  #app-root{
    max-width: 520px;
    margin: 0 auto;
    min-height: 100vh;
    background: transparent;
    display:flex;
    flex-direction:column;
    position:relative;
  }
  .topbar{
    padding: 22px 20px 16px;
  }
  .brand{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:14px;
  }
  .brand-logo{
    height: 32px;
    width: auto;
    display:block;
  }
  .today-card{
    background: var(--bg-elev);
    border-radius: var(--radius-md);
    padding: 14px 16px;
    box-shadow: var(--shadow);
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  .today-date{
    font-size:14.5px;
    color: var(--ink);
    font-weight:500;
    text-transform:capitalize;
  }
  .today-sub{
    font-family: var(--font-mono);
    font-size:11.5px;
    color: var(--ink-faint);
    margin-top:2px;
  }
  .holiday-badge{
    font-size:11px;
    font-weight:600;
    color: var(--amber);
    background: var(--amber-bg);
    padding:5px 9px;
    border-radius: 20px;
    white-space:nowrap;
  }
  .install-banner{
    margin-top:10px;
    background: var(--primary-soft);
    border-radius: var(--radius-md);
    padding: 12px 14px;
    display:flex;
    align-items:center;
    gap:10px;
    justify-content:space-between;
  }
  .install-banner .install-text{ font-size:12.5px; color: var(--primary-dark); line-height:1.4; }
  .install-banner-actions{ display:flex; align-items:center; gap:8px; flex:0 0 auto; }
  .install-dismiss{ background:none; border:none; color: var(--primary-dark); font-size:14px; cursor:pointer; opacity:0.6; padding:4px; }
  main{
    flex:1;
    padding: 4px 20px 100px;
  }
  .stock-alert{
    background: var(--amber-bg);
    border: 1px solid #EAD4B0;
    color:#7A4E17;
    border-radius: var(--radius-md);
    padding: 12px 14px;
    font-size:13px;
    margin-bottom:16px;
    line-height:1.5;
  }
  .stock-alert b{font-weight:600;}
  .section-label{
    font-family: var(--font-mono);
    font-size:11px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color: var(--ink-faint);
    margin: 18px 0 10px;
  }
  .empty-state{
    text-align:center;
    padding: 60px 20px;
    color: var(--ink-soft);
  }
  .empty-state .pill-icon{
    font-size:38px;
    display:block;
    margin-bottom:14px;
  }
  .empty-state p{
    font-size:14.5px;
    line-height:1.6;
    margin: 0 0 18px;
  }
  .success-banner{
    background: var(--taken-bg);
    border-radius: var(--radius-md);
    padding: 18px 16px;
    text-align:center;
    color: var(--primary-dark);
    font-weight:500;
    font-size:14.5px;
    margin-bottom: 16px;
  }
  .btn{
    font-family: var(--font-body);
    font-size:14px;
    font-weight:600;
    border:none;
    border-radius: 30px;
    padding: 12px 20px;
    cursor:pointer;
    transition: transform .12s ease, opacity .12s ease;
  }
  .btn:active{ transform: scale(0.97); }
  .btn-primary{ background: var(--primary); color:#fff; }
  .btn-ghost{ background: var(--bg-elev); color: var(--primary-dark); border:1px solid var(--line); }
  .btn-danger{ background: var(--red-bg); color: var(--red); }
  .btn-block{ width:100%; }
  .btn-sm{ font-size:12.5px; padding: 7px 12px; }

  .dose-table{ width:100%; border-collapse:separate; border-spacing:0 8px; }
  .dose-table thead th{ text-align:left; font-family: var(--font-mono); font-size:10.5px; letter-spacing:0.05em; text-transform:uppercase; color: var(--ink-faint); font-weight:500; padding:0 12px 4px; }
  .dose-table thead th.col-check{ text-align:center; width:60px; }
  .dose-table tbody td{ background: var(--bg-elev); padding:12px 10px; font-size:14px; box-shadow: var(--shadow); }
  .dose-table tbody tr.overdue td{ background: var(--amber-bg); }
  .dose-table tbody td:first-child{ border-radius:14px 0 0 14px; padding-left:14px; }
  .dose-table tbody td:last-child{ border-radius:0 14px 14px 0; padding-right:10px; }
  .dose-table .td-nome{ font-weight:600; color: var(--ink); }
  .dose-table .td-horario{ font-family: var(--font-mono); font-size:12px; color: var(--ink-faint); }
  .dose-table tr.overdue .td-horario{ color: var(--amber); font-weight:500; }
  .dose-table .td-check{ text-align:center; }
  .dose-check-sm{
    width:34px; height:34px; border-radius:50%; border:none; cursor:pointer; position:relative;
    background: radial-gradient(circle at 32% 28%, #F2F6F4, #D7E2DC 60%, #C4D3CB 100%);
    box-shadow: inset 0 0 0 2px #FFFFFFAA, 0 1px 2px rgba(0,0,0,0.12);
    transition: transform .18s cubic-bezier(.34,1.56,.64,1);
  }
  .dose-check-sm:active{ transform: scale(0.85); }
  .dose-check-sm .chk{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:#fff; font-size:15px; font-weight:700; opacity:0; }
  .dose-list{ display:flex; flex-direction:column; gap:10px; }
  .dose-item{
    background: var(--bg-elev);
    border-radius: var(--radius-md);
    padding: 12px 14px;
    display:flex;
    align-items:center;
    gap:12px;
    box-shadow: var(--shadow);
    border: 1px solid transparent;
  }
  .dose-item.overdue{ border-color:#E6BE8F; background: linear-gradient(0deg, var(--bg-elev), var(--bg-elev)), var(--amber-bg); }
  .dose-check{
    flex: 0 0 auto;
    width:46px;height:46px;
    border-radius:50%;
    border:none;
    cursor:pointer;
    position:relative;
    background: radial-gradient(circle at 32% 28%, #F2F6F4, #D7E2DC 60%, #C4D3CB 100%);
    box-shadow: inset 0 0 0 2px #FFFFFFAA, 0 1px 2px rgba(0,0,0,0.12);
    transition: transform .18s cubic-bezier(.34,1.56,.64,1), background .2s ease;
  }
  .dose-check:active{ transform: scale(0.88); }
  .dose-check.checked{
    background: radial-gradient(circle at 32% 28%, #6FA189, var(--taken) 65%, #3E6650 100%);
  }
  .dose-check .chk{
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    color:#fff; font-size:19px; font-weight:700;
    opacity:0; transform: scale(0.5);
    transition: opacity .15s ease, transform .18s cubic-bezier(.34,1.56,.64,1);
  }
  .dose-check.checked .chk{ opacity:1; transform: scale(1); }
  .dose-info{ flex:1; min-width:0; }
  .dose-name{ font-weight:600; font-size:14.5px; color:var(--ink); }
  .dose-meta{ font-family: var(--font-mono); font-size:12px; color: var(--ink-faint); margin-top:2px; }
  .dose-meta.overdue-text{ color: var(--amber); font-weight:500; }

  details.completed-wrap{ margin-top:18px; }
  details.completed-wrap summary{
    font-size:13px; font-weight:600; color: var(--ink-soft);
    cursor:pointer; list-style:none; padding:4px 0;
  }
  details.completed-wrap summary::-webkit-details-marker{ display:none; }
  .completed-item{
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 4px; border-bottom:1px solid var(--line);
    font-size:13.5px; color: var(--ink-soft);
  }
  .completed-item .cname{ text-decoration: line-through; color: var(--ink-faint); }
  .link-btn{
    background:none; border:none; color: var(--primary); font-weight:600;
    font-size:12.5px; cursor:pointer; padding:4px 6px;
  }

  .cal-nav{ display:flex; align-items:center; justify-content:space-between; margin: 6px 0 14px; }
  .cal-nav h2{ font-family: var(--font-display); font-size:18px; margin:0; text-transform:capitalize; color:var(--primary-dark); }
  .cal-nav button{
    background: var(--bg-elev); border:1px solid var(--line); border-radius:50%;
    width:34px; height:34px; font-size:15px; cursor:pointer; color:var(--primary-dark);
  }
  .cal-weekdays{ display:grid; grid-template-columns:repeat(7,1fr); text-align:center; margin-bottom:6px; }
  .cal-weekdays span{ font-family: var(--font-mono); font-size:10.5px; color:var(--ink-faint); }
  .cal-grid{ display:grid; grid-template-columns:repeat(7,1fr); gap:5px; }
  .cal-cell{
    aspect-ratio:1; border-radius:10px; display:flex; flex-direction:column;
    align-items:center; justify-content:center; font-size:13px; font-weight:500;
    cursor:pointer; position:relative; border:1px solid transparent; color: var(--ink);
    background: var(--bg-elev);
  }
  .cal-cell.blank{ visibility:hidden; cursor:default; }
  .cal-cell.futuro{ background: var(--bg-elev); color: var(--ink-faint); }
  .cal-cell.sem{ background:#F2F5F3; color: var(--ink-faint); }
  .cal-cell.completo{ background: var(--taken-bg); color: var(--primary-dark); }
  .cal-cell.parcial{ background: var(--amber-bg); color:#7A4E17; }
  .cal-cell.faltou{ background: var(--red-bg); color:#7A3423; }
  .cal-cell.is-today{ border-color: var(--primary); box-shadow: 0 0 0 2px var(--primary-soft); font-weight:700; }
  .cal-cell.is-selected{ outline:2px solid var(--primary-dark); }
  .cal-dot{ width:4px; height:4px; border-radius:50%; background: var(--amber); position:absolute; bottom:5px; }
  .cal-legend{ display:flex; flex-wrap:wrap; gap:10px; margin-top:14px; }
  .cal-legend span{ font-size:11px; color: var(--ink-soft); display:flex; align-items:center; gap:5px; }
  .cal-legend i{ width:9px; height:9px; border-radius:3px; display:inline-block; }
  .day-detail{
    margin-top:16px; background: var(--bg-elev); border-radius: var(--radius-md);
    padding:14px 16px; box-shadow: var(--shadow);
  }
  .day-detail h3{ font-family: var(--font-display); font-size:15px; margin:0 0 4px; text-transform:capitalize; }
  .day-detail .dd-holiday{ font-size:12px; color:var(--amber); font-weight:600; margin-bottom:8px; }
  .dd-item{ display:flex; align-items:center; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--line); font-size:13.5px; }
  .dd-item:last-child{ border-bottom:none; }
  .dd-check{ width:22px; height:22px; border-radius:50%; border:1.5px solid var(--line); background:#fff; cursor:pointer; flex:0 0 auto; }
  .dd-check.on{ background: var(--taken); border-color: var(--taken); }

  .med-card{
    background: var(--bg-elev); border-radius: var(--radius-md); padding:14px 16px;
    box-shadow: var(--shadow); margin-bottom:12px;
  }
  .med-card.paused{ opacity:0.55; }
  .med-card-top{ display:flex; justify-content:space-between; align-items:flex-start; gap:10px; }
  .med-name{ font-family: var(--font-display); font-weight:600; font-size:16px; color:var(--ink); }
  .med-freq{ font-family: var(--font-mono); font-size:12px; color: var(--ink-soft); margin-top:4px; line-height:1.5; }
  .med-stock{ font-size:11.5px; font-weight:600; padding:3px 8px; border-radius:20px; background: var(--primary-soft); color:var(--primary-dark); white-space:nowrap; }
  .med-stock.low{ background: var(--red-bg); color: var(--red); }
  .med-actions{ display:flex; gap:8px; margin-top:12px; }

  .modal-overlay{
    position:fixed; inset:0; background: rgba(20,34,32,0.42);
    display:flex; align-items:flex-end; justify-content:center; z-index:50;
  }
  @media (min-width:560px){ .modal-overlay{ align-items:center; } }
  .modal{
    background: var(--bg-elev); width:100%; max-width:480px;
    border-radius: 24px 24px 0 0; padding: 20px 20px 24px; max-height:88vh; overflow-y:auto;
  }
  @media (min-width:560px){ .modal{ border-radius:24px; } }
  .modal h2{ font-family: var(--font-display); font-size:19px; margin:0 0 16px; color:var(--primary-dark); }
  .field{ margin-bottom:14px; }
  .field label{ display:block; font-size:12.5px; font-weight:600; color: var(--ink-soft); margin-bottom:6px; }
  .field input[type=text], .field input[type=number], .field input[type=date]{
    width:100%; padding:10px 12px; border-radius:10px; border:1px solid var(--line);
    font-family: var(--font-body); font-size:14px; background:#FBFCFB;
  }
  .field input[type=time]{
    padding:9px 10px; border-radius:10px; border:1px solid var(--line); font-family: var(--font-mono); font-size:13px; background:#FBFCFB;
  }
  .freq-options{ display:flex; flex-direction:column; gap:8px; }
  .freq-option{ display:flex; align-items:center; gap:9px; font-size:13.5px; padding:9px 10px; border:1px solid var(--line); border-radius:10px; cursor:pointer; }
  .freq-option input{ margin:0; }
  .weekday-toggles{ display:flex; gap:6px; margin-top:10px; flex-wrap:wrap; }
  .weekday-toggle{
    width:36px; height:36px; border-radius:50%; border:1px solid var(--line); background:#fff;
    font-family: var(--font-mono); font-size:11.5px; cursor:pointer; color: var(--ink-soft);
  }
  .weekday-toggle.active{ background: var(--primary); color:#fff; border-color:var(--primary); }
  .horarios-grid{ display:flex; flex-wrap:wrap; gap:8px; }
  .horario-slot{ display:flex; flex-direction:column; gap:4px; }
  .horario-slot span{ font-family: var(--font-mono); font-size:10.5px; color:var(--ink-faint); }
  .two-col{ display:flex; gap:10px; }
  .two-col .field{ flex:1; }
  .form-errors{ background: var(--red-bg); color: var(--red); border-radius:10px; padding:10px 12px; font-size:12.5px; margin-bottom:14px; }
  .modal-footer{ display:flex; gap:10px; margin-top:6px; }
  .modal-footer .btn{ flex:1; }
  .hint-text{ font-size:11.5px; color: var(--ink-faint); margin-top:6px; line-height:1.5; }

  .confirm-modal{ max-width:340px; text-align:center; padding:24px 22px; border-radius:20px; }
  .confirm-modal p{ font-size:14px; color: var(--ink); line-height:1.6; margin: 8px 0 18px; }
  .confirm-modal h2{ font-size:16px; }

  .tabbar{
    position:fixed; bottom:0; left:0; right:0;
    display:flex; justify-content:center;
    background: rgba(255,255,255,0.92); backdrop-filter: blur(10px);
    border-top:1px solid var(--line);
    z-index:30;
  }
  .tabbar-inner{ max-width:520px; width:100%; display:flex; }
  .tab-btn{
    flex:1; background:none; border:none; padding: 13px 4px 16px; cursor:pointer;
    font-family: var(--font-body); font-size:11.5px; font-weight:600; color: var(--ink-faint);
    display:flex; flex-direction:column; align-items:center; gap:3px;
  }
  .tab-btn .tab-icon{ font-size:18px; }
  .tab-btn.active{ color: var(--primary); }

  .settings-row{ display:flex; flex-direction:column; gap:8px; margin-top:22px; padding-top:14px; border-top:1px solid var(--line); }
  .settings-row summary{ font-size:12.5px; font-weight:600; color: var(--ink-faint); cursor:pointer; list-style:none; margin-bottom:10px; }
  .settings-row summary::-webkit-details-marker{ display:none; }
  .settings-row summary::before{ content:'⚙ '; }
  .settings-row .btn{ font-size:12.5px; padding:9px 14px; }

  .toast-root{ position:fixed; bottom:88px; left:0; right:0; display:flex; justify-content:center; z-index:80; pointer-events:none; }
  .toast{
    background: var(--primary-dark); color:#fff; font-size:13px; font-weight:500;
    padding:11px 18px; border-radius:30px; box-shadow:0 6px 20px rgba(0,0,0,0.2);
    opacity:0; transform: translateY(8px); transition: opacity .2s ease, transform .2s ease;
  }
  .toast.show{ opacity:1; transform: translateY(0); }

  .loading-state{ text-align:center; padding:80px 20px; color: var(--ink-faint); font-size:13px; }

  .auth-screen{
    display:flex; align-items:center; justify-content:center; min-height:100vh; padding:24px;
  }
  .auth-card{
    background: var(--bg-elev); border-radius: var(--radius-lg); box-shadow: var(--shadow);
    padding: 28px 24px; width:100%; max-width:380px;
  }
  .auth-tabs{ display:flex; gap:6px; background:#EEF3EF; border-radius:12px; padding:4px; margin-bottom:20px; }
  .auth-tab{ flex:1; border:none; background:none; padding:9px 0; border-radius:9px; font-family: var(--font-body); font-size:13px; font-weight:600; color: var(--ink-soft); cursor:pointer; }
  .auth-tab.active{ background:#fff; color: var(--primary-dark); box-shadow: var(--shadow); }
  .auth-card .field input{ width:100%; }
</style>
</head>
<body>
<div id="authScreen" class="auth-screen">
  <div class="auth-card">
    <div class="brand" style="justify-content:center;margin-bottom:20px;">
      <img src="logo-full.png" alt="MedControl" class="brand-logo">
    </div>
    <div class="auth-tabs">
      <button type="button" class="auth-tab active" data-authtab="entrar">Entrar</button>
      <button type="button" class="auth-tab" data-authtab="criar">Criar conta</button>
    </div>
    <div id="authError" class="form-errors" style="display:none;"></div>
    <div class="field"><label>E-mail</label><input type="email" id="authEmail" autocomplete="email"></div>
    <div class="field"><label>Senha</label><input type="password" id="authPassword" autocomplete="current-password"></div>
    <button type="button" class="btn btn-primary btn-block" id="authSubmitBtn">Entrar</button>
    <button type="button" class="link-btn" id="authForgotBtn" style="display:block;margin:12px auto 0;">Esqueci minha senha</button>
  </div>
</div>
<div id="app-root" style="display:none;">
  <header class="topbar">
    <div class="brand">
      <img src="logo-full.png" alt="MedControl" class="brand-logo">
    </div>
    <div class="today-card">
      <div>
        <div class="today-date" id="todayDate">carregando...</div>
        <div class="today-sub" id="todaySub"></div>
      </div>
      <div id="holidaySlot"></div>
    </div>
    <div id="installBanner" class="install-banner" style="display:none;">
      <span class="install-text"></span>
      <div class="install-banner-actions">
        <button type="button" class="btn btn-primary btn-sm" data-action="install-app">Instalar</button>
        <button type="button" class="install-dismiss" data-action="dismiss-install" aria-label="Fechar">&#10005;</button>
      </div>
    </div>
  </header>
  <main id="main"><div class="loading-state">Carregando seus dados...</div></main>
  <nav class="tabbar">
    <div class="tabbar-inner">
      <button class="tab-btn active" data-action="set-tab" data-tab="hoje"><span class="tab-icon">&#128138;</span>Hoje</button>
      <button class="tab-btn" data-action="set-tab" data-tab="calendario"><span class="tab-icon">&#128197;</span>Calendário</button>
      <button class="tab-btn" data-action="set-tab" data-tab="remedios"><span class="tab-icon">&#128203;</span>Remédios</button>
    </div>
  </nav>
</div>
<div id="modalRoot"></div>
<div class="toast-root" id="toastRoot"></div>
<input type="file" id="importFileInput" accept="application/json" style="display:none">

<script type="module">
  // ==================================================================
  // CONFIGURAÇÃO DO FIREBASE — substitua pelos dados do SEU projeto.
  // Firebase Console > Configurações do projeto > Seus apps > app Web.
  // Esses valores não são secretos (não é senha nem chave de API
  // sensível): quem protege os dados são as Regras de Segurança do
  // Firestore, configuradas separadamente no console.
  // ==================================================================
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";
  import {
    getAuth, onAuthStateChanged, signInWithEmailAndPassword,
    createUserWithEmailAndPassword, signOut, sendPasswordResetEmail
  } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-auth.js";
  import {

    return fmt.format(new Date());

  function dateStrToDate(str){
    var parts = str.split('-').map(Number);
    return new Date(parts[0], parts[1]-1, parts[2]);
  }
  function dateToStr(d){
    var y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), day=String(d.getDate()).padStart(2,'0');
    return y+'-'+m+'-'+day;
  }

    var d = dateStrToDate(str);
    var s = WEEKDAYS_LONG[d.getDay()] + ', ' + d.getDate() + ' de ' + MONTHS[d.getMonth()] + ' de ' + d.getFullYear();
    return s.charAt(0).toUpperCase() + s.slice(1);
  }

  /* ---------- Feriados nacionais (fixos + móveis via Páscoa) ---------- */
  var holidayCache = {};
  function easterDate(year){
    var a=year%19,b=Math.floor(year/100),c=year%100,d=Math.floor(b/4),e=b%4;
    var f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30;
    var i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7,m=Math.floor((a+11*h+22*l)/451);
    var month=Math.floor((h+l-7*m+114)/31), day=((h+l-7*m+114)%31)+1;
    return new Date(year, month-1, day);
  }
  function addDaysToDate(date,n){ var d=new Date(date); d.setDate(d.getDate()+n); return d; }
  function nationalHolidays(year){
    var easter = easterDate(year);
    var list = [
      {date:new Date(year,0,1), name:'Confraternização Universal'},
      {date:new Date(year,3,21), name:'Tiradentes'},

      {date:addDaysToDate(easter,-2), name:'Sexta-feira Santa'},

  /* ---------- Helpers gerais ---------- */

  /* ---------- Regras de frequência ---------- */
  function isMedActiveOnDate(med, dateStr){
    if(med.ativo === false) return false;
    if(dateStr < med.dataInicio) return false;
    if(med.dataFim && dateStr > med.dataFim) return false;
    if(med.frequencia === 'diario') return true;
    if(med.frequencia === 'semanal') return med.diasSemana.indexOf(weekdayOf(dateStr)) !== -1;
    if(med.frequencia === 'alternado'){
      var start = dateStrToDate(med.dataInicio), cur = dateStrToDate(dateStr);
      var diff = Math.round((cur - start) / 86400000);
      return diff % 2 === 0;
    }
    return false;
  }
  function dosesForDate(meds, dateStr){
    var result = [];
    meds.forEach(function(med){
      if(isMedActiveOnDate(med, dateStr)){
        for(var i=0;i<med.vezesPorDia;i++){ result.push({ medId: med.id, doseIndex: i, med: med }); }
      }
    });
    return result;
  }
  function doseKey(medId, idx){ return medId + '-' + idx; }
  function describeFrequencia(med){

    else if(med.frequencia === 'alternado') base = 'Dia sim, dia não · desde ' + formatDateShort(med.dataInicio);
    else {
      var dias = med.diasSemana.slice().sort().map(function(d){ return WEEKDAYS_ABBR[d]; }).join(', ');
      base = 'Semanal · ' + dias;
    }
    var horarios = (med.horarios || []).filter(Boolean);
    var vezes = med.vezesPorDia + 'x ao dia';
    if(horarios.length) vezes += ' (' + horarios.join(', ') + ')';
    if(med.dataFim) vezes += ' · até ' + formatDateShort(med.dataFim);
    return base + ' · ' + vezes;
  }

      '<input type="number" min="0" data-field="estoqueAlertaMinimo" value="' + f.estoqueAlertaMinimo + '" placeholder="Ex: 5"></div>' +
    '</div>';

    html += '<div class="modal-footer">' +
      '<button class="btn btn-ghost" data-action="close-modal">Cancelar</button>' +
      '<button class="btn btn-primary" data-action="save-med">Salvar</button>' +
    '</div></div></div>';

    document.getElementById('modalRoot').innerHTML = html;
  }

  function closeModal(){ modalForm = null; document.getElementById('modalRoot').innerHTML = ''; }

  function validateMedForm(f){
    var errors = [];
    if(!f.nome || !f.nome.trim()) errors.push('Informe o nome do remédio.');
    if(!f.dataInicio) errors.push('Informe a data de início.');
    if(f.dataFim && f.dataFim < f.dataInicio) errors.push('A data de término deve ser igual ou posterior à data de início.');
    if(f.frequencia === 'semanal' && f.diasSemana.length === 0) errors.push('Selecione ao menos um dia da semana.');
    if(f.vezesPorDia < 1 || f.vezesPorDia > 6) errors.push('Quantidade de vezes ao dia deve ser entre 1 e 6.');
    return errors;
  }

  async function saveMedFromForm(){
    var f = modalForm;
    var errors = validateMedForm(f);
    if(errors.length){ renderMedModal(errors); return; }
    var med = {
      id: f.id || uid(),
      nome: f.nome.trim(),
      vezesPorDia: clamp(parseInt(f.vezesPorDia,10) || 1, 1, 6),
      horarios: f.horarios.slice(0, f.vezesPorDia),
      frequencia: f.frequencia,
      diasSemana: f.frequencia === 'semanal' ? f.diasSemana.slice() : [],
      dataInicio: f.dataInicio,
      dataFim: f.dataFim || null,
      estoqueAtual: f.estoqueAtual === '' ? null : Number(f.estoqueAtual),
      estoqueAlertaMinimo: f.estoqueAlertaMinimo === '' ? null : Number(f.estoqueAlertaMinimo),
      ativo: f.ativo !== false
    };
    var idx = state.meds.findIndex(function(m){ return m.id === med.id; });
    if(idx === -1) state.meds.push(med); else state.meds[idx] = med;
    await saveMedications(state.meds);
    closeModal();
    render();
    showToast('Remédio salvo.');
  }

  /* ---------- Confirmação genérica ---------- */
  function openConfirm(title, message, danger, onYes){
    pendingConfirm = onYes;
    var html = '<div class="modal-overlay" data-action="cancel-confirm"><div class="modal confirm-modal" data-stop="1">' +
      '<h2>' + escapeHtml(title) + '</h2>' +
      '<p>' + escapeHtml(message) + '</p>' +
      '<div class="modal-footer">' +
        '<button class="btn btn-ghost" data-action="cancel-confirm">Cancelar</button>' +
        '<button class="btn ' + (danger ? 'btn-danger' : 'btn-primary') + '" data-action="confirm-yes">Confirmar</button>' +
      '</div></div></div>';
    document.getElementById('modalRoot').innerHTML = html;
  }
  function closeConfirm(){ pendingConfirm = null; document.getElementById('modalRoot').innerHTML = ''; }

  /* ---------- Toast ---------- */
  function showToast(msg){
    var root = document.getElementById('toastRoot');
    var el = document.createElement('div');
    el.className = 'toast';
    el.textContent = msg;
    root.innerHTML = '';
    root.appendChild(el);
    requestAnimationFrame(function(){ el.classList.add('show'); });
    setTimeout(function(){
      el.classList.remove('show');
      setTimeout(function(){ if(el.parentNode) el.parentNode.removeChild(el); }, 250);
    }, 2400);
  }

  /* ---------- Ações ---------- */
  async function toggleDose(dateStr, medId, idx){
    var key = doseKey(medId, idx);
    if(!state.checkins[dateStr]) state.checkins[dateStr] = {};
    var wasOn = !!state.checkins[dateStr][key];
    state.checkins[dateStr][key] = !wasOn;
    var med = state.meds.find(function(m){ return m.id === medId; });
    if(med && typeof med.estoqueAtual === 'number'){
      med.estoqueAtual = wasOn ? med.estoqueAtual + 1 : Math.max(0, med.estoqueAtual - 1);
      await saveMedications(state.meds);
    }
    await saveCheckins(state.checkins);
    render();
  }

  async function deleteMed(id){
    state.meds = state.meds.filter(function(m){ return m.id !== id; });
    await saveMedications(state.meds);
    render();
    showToast('Remédio excluído.');
  }
  async function toggleActiveMed(id){
    var med = state.meds.find(function(m){ return m.id === id; });
    if(!med) return;
    med.ativo = med.ativo === false ? true : false;
    await saveMedications(state.meds);
    render();
    showToast(med.ativo ? 'Remédio reativado.' : 'Remédio pausado.');
  }

  function exportBackup(){
    var payload = { meds: state.meds, checkins: state.checkins, exportedAt: new Date().toISOString() };
    var blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'medcontrol-backup-' + todayStrBR() + '.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function(){ URL.revokeObjectURL(url); }, 1000);
    showToast('Backup exportado.');
  }
  function handleImportFile(file){
    var reader = new FileReader();
    reader.onload = function(){
      try{
        var data = JSON.parse(reader.result);
        if(!data || !Array.isArray(data.meds) || typeof data.checkins !== 'object'){
          showToast('Arquivo inválido.'); return;
        }
        openConfirm('Importar backup', 'Isso substitui todos os remédios e o histórico atuais pelos dados do arquivo. Continuar?', true, async function(){
          state.meds = data.meds;
          state.checkins = data.checkins;
          await saveMedications(state.meds);
          await saveCheckins(state.checkins);
          render();
          showToast('Backup importado.');
        });
      }catch(e){ showToast('Não consegui ler o arquivo.'); }
    };
    reader.readAsText(file);
  }

  /* ---------- Delegação de eventos ---------- */
  document.getElementById('app-root').addEventListener('click', function(e){
    var actionEl = e.target.closest('[data-action]');
    if(!actionEl) return;
    var action = actionEl.dataset.action;
    if(action === 'set-tab'){
      state.tab = actionEl.dataset.tab;
      state.selectedCalDay = null;
      render();
    } else if(action === 'goto-remedios'){
      state.tab = 'remedios'; render();
    } else if(action === 'toggle-dose'){
      toggleDose(actionEl.dataset.date, actionEl.dataset.med, parseInt(actionEl.dataset.idx,10));
    } else if(action === 'cal-prev'){
      state.calMonth--; if(state.calMonth<0){ state.calMonth=11; state.calYear--; }
      state.selectedCalDay = null; render();
    } else if(action === 'cal-next'){
      state.calMonth++; if(state.calMonth>11){ state.calMonth=0; state.calYear++; }
      state.selectedCalDay = null; render();
    } else if(action === 'cal-select-day'){
      state.selectedCalDay = (state.selectedCalDay === actionEl.dataset.date) ? null : actionEl.dataset.date;
      render();
    } else if(action === 'open-med-form'){
      openMedForm(actionEl.dataset.id || null);
    } else if(action === 'request-delete-med'){
      var id = actionEl.dataset.id;
      var med = state.meds.find(function(m){ return m.id === id; });
      openConfirm('Excluir remédio', 'Excluir "' + (med?med.nome:'') + '"? Essa ação não pode ser desfeita.', true, function(){ deleteMed(id); });
    } else if(action === 'toggle-active-med'){
      toggleActiveMed(actionEl.dataset.id);
    } else if(action === 'export-backup'){
      exportBackup();
    } else if(action === 'trigger-import'){
      document.getElementById('importFileInput').click();
    } else if(action === 'logout'){
      signOut(auth);
    } else if(action === 'install-app'){
      if(deferredInstallPrompt){
        deferredInstallPrompt.prompt();
        deferredInstallPrompt.userChoice.then(function(){
          deferredInstallPrompt = null;
          document.getElementById('installBanner').style.display = 'none';
        });
      }
    } else if(action === 'dismiss-install'){
      dismissInstallBanner();
      document.getElementById('installBanner').style.display = 'none';
    } else if(action === 'request-wipe'){
      openConfirm('Apagar todos os dados', 'Isso remove todos os remédios cadastrados e todo o histórico. Essa ação não pode ser desfeita.', true, async function(){
        state.meds = []; state.checkins = {};
        await saveMedications(state.meds); await saveCheckins(state.checkins);
        render(); showToast('Todos os dados foram apagados.');
      });
    }
  });

  document.getElementById('modalRoot').addEventListener('click', function(e){
    if(e.target.dataset.action === 'overlay-close' || e.target.dataset.action === 'close-modal'){ closeModal(); return; }
    if(e.target.dataset.action === 'cancel-confirm'){ closeConfirm(); return; }
    if(e.target.dataset.action === 'confirm-yes'){
      var cb = pendingConfirm; closeConfirm(); if(cb) cb();
      return;
    }
    if(e.target.dataset.action === 'save-med'){ saveMedFromForm(); return; }
    if(e.target.dataset.action === 'toggle-dia'){
      var day = parseInt(e.target.dataset.day, 10);
      var i2 = modalForm.diasSemana.indexOf(day);
      if(i2===-1) modalForm.diasSemana.push(day); else modalForm.diasSemana.splice(i2,1);
      renderMedModal([]);
      return;
    }
    if(e.target.dataset.action === 'toggle-dose'){
      toggleDose(e.target.dataset.date, e.target.dataset.med, parseInt(e.target.dataset.idx,10));
      return;
    }
  });
  document.getElementById('modalRoot').addEventListener('input', function(e){
    var field = e.target.dataset.field;
    if(field && modalForm){
      if(field === 'vezesPorDia'){
        var n = clamp(parseInt(e.target.value,10) || 1, 1, 6);
        modalForm.vezesPorDia = n;
        modalForm.horarios = resizeHorarios(modalForm.horarios, n);
        renderMedModal([]);
        return;
      }
      modalForm[field] = e.target.value;
    }
    if(e.target.dataset.action === 'horario-input'){
      var idx = parseInt(e.target.dataset.idx,10);
      modalForm.horarios[idx] = e.target.value;
    }
  });
  document.getElementById('modalRoot').addEventListener('change', function(e){
    if(e.target.name === 'freq'){
      modalForm.frequencia = e.target.value;
      renderMedModal([]);
    }
  });
  document.getElementById('importFileInput').addEventListener('change', function(e){
    if(e.target.files && e.target.files[0]) handleImportFile(e.target.files[0]);
    e.target.value = '';
  });

  /* ---------- Inicialização do app (após login) ---------- */
  async function init(){
    state.meds = await loadMedications();
    state.checkins = await loadCheckins();
    var t = dateStrToDate(todayStrBR());
    state.calYear = t.getFullYear();
    state.calMonth = t.getMonth();
    state.loaded = true;
    render();
    if(refreshTimer) clearInterval(refreshTimer);
    refreshTimer = setInterval(function(){
      if(!document.getElementById('modalRoot').firstChild) render();
    }, 30000);
  }

  /* ---------- PWA: instalar na tela inicial ---------- */
  if('serviceWorker' in navigator){
    window.addEventListener('load', function(){
      navigator.serviceWorker.register('sw.js').catch(function(){});
    });
  }
  function isStandaloneDisplay(){
    return (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches) || window.navigator.standalone === true;
  }
  function isIOSDevice(){
    return /iphone|ipad|ipod/i.test(navigator.userAgent) && !window.MSStream;
  }
  function hasDismissedInstallBanner(){
    try{ return localStorage.getItem('medcontrol_install_dismissed') === '1'; }catch(e){ return false; }
  }
  function dismissInstallBanner(){
    try{ localStorage.setItem('medcontrol_install_dismissed', '1'); }catch(e){}
  }
  function maybeShowInstallBanner(){
    if(!currentUser || isStandaloneDisplay() || hasDismissedInstallBanner()) return;
    var banner = document.getElementById('installBanner');
    if(deferredInstallPrompt){
      banner.querySelector('.install-text').textContent = 'Instale o MedControl na tela inicial pra abrir mais rápido.';
      banner.querySelector('[data-action="install-app"]').style.display = 'inline-block';
      banner.style.display = 'flex';
    } else if(isIOSDevice()){
      banner.querySelector('.install-text').textContent = 'No iPhone: toque em Compartilhar e depois em "Adicionar à Tela de Início".';
      banner.querySelector('[data-action="install-app"]').style.display = 'none';
      banner.style.display = 'flex';
    }
  }
  window.addEventListener('beforeinstallprompt', function(e){
    e.preventDefault();
    deferredInstallPrompt = e;
    maybeShowInstallBanner();
  });
  window.addEventListener('appinstalled', function(){
    deferredInstallPrompt = null;
    document.getElementById('installBanner').style.display = 'none';
  });

  /* ---------- Autenticação (login / criar conta / sair) ---------- */
  var authMode = 'entrar';
  function updateAuthUI(){
    document.querySelectorAll('#authScreen .auth-tab').forEach(function(b){
      b.classList.toggle('active', b.dataset.authtab === authMode);
    });
    document.getElementById('authSubmitBtn').textContent = authMode === 'entrar' ? 'Entrar' : 'Criar conta';
    document.getElementById('authForgotBtn').style.display = authMode === 'entrar' ? 'block' : 'none';
    document.getElementById('authError').style.display = 'none';
  }
  function showAuthError(msg){
    var el = document.getElementById('authError');
    el.textContent = msg;
    el.style.display = 'block';
  }
  function translateAuthError(err){
    var map = {
      'auth/invalid-email': 'E-mail inválido.',
      'auth/user-not-found': 'Não encontramos uma conta com esse e-mail.',
      'auth/wrong-password': 'Senha incorreta.',
      'auth/invalid-credential': 'E-mail ou senha incorretos.',
      'auth/email-already-in-use': 'Já existe uma conta com esse e-mail.',
      'auth/weak-password': 'A senha precisa ter pelo menos 6 caracteres.',
      'auth/missing-password': 'Informe a senha.',
      'auth/too-many-requests': 'Muitas tentativas. Aguarde um pouco e tente de novo.',
      'auth/unauthorized-domain': 'Este site ainda não está autorizado no Firebase. Vá em Authentication > Settings > Domínios autorizados e adicione este domínio.'
    };
    return (err && map[err.code]) || 'Não foi possível concluir. Tente de novo.';
  }
  async function handleAuthSubmit(){
    var email = document.getElementById('authEmail').value.trim();
    var pass = document.getElementById('authPassword').value;
    if(!email || !pass){ showAuthError('Preencha e-mail e senha.'); return; }
    try{
      if(authMode === 'entrar'){
        await signInWithEmailAndPassword(auth, email, pass);
      } else {
        await createUserWithEmailAndPassword(auth, email, pass);
      }
    }catch(err){ showAuthError(translateAuthError(err)); }
  }
  async function handleForgotPassword(){
    var email = document.getElementById('authEmail').value.trim();
    if(!email){ showAuthError('Digite seu e-mail acima e toque em "Esqueci minha senha" de novo.'); return; }
    try{
      await sendPasswordResetEmail(auth, email);
      showToast('Enviamos um link de redefinição para ' + email + '.');
    }catch(err){ showAuthError(translateAuthError(err)); }
  }
  document.getElementById('authScreen').addEventListener('click', function(e){
    var tabBtn = e.target.closest('[data-authtab]');
    if(tabBtn){ authMode = tabBtn.dataset.authtab; updateAuthUI(); return; }
    if(e.target.id === 'authForgotBtn'){ handleForgotPassword(); return; }
    if(e.target.id === 'authSubmitBtn'){ handleAuthSubmit(); return; }
  });

  onAuthStateChanged(auth, function(user){
    currentUser = user;
    if(user){
      document.getElementById('authScreen').style.display = 'none';
      document.getElementById('app-root').style.display = 'flex';
      init();
      maybeShowInstallBanner();
    } else {
      if(refreshTimer){ clearInterval(refreshTimer); refreshTimer = null; }
      state.meds = []; state.checkins = {}; state.tab = 'hoje'; state.selectedCalDay = null; state.loaded = false;
      document.getElementById('app-root').style.display = 'none';
      document.getElementById('installBanner').style.display = 'none';
      document.getElementById('authScreen').style.display = 'flex';
    }
  });
})();
</script>
</body>
</html>
